name: finbytes
description: Transform complex financial news into 90-word, jargon-free micro-learning cards.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  tiktoklikescroller: ^0.2.8
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  supabase_flutter: ^2.5.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
